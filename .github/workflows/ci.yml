name: PayFlow CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 819048646487
  ECR_REGISTRY: 819048646487.dkr.ecr.us-east-1.amazonaws.com

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run all tests
        run: mvn clean test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/target/surefire-reports/'

  build:
    name: Build Services
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all services
        run: mvn clean package -DskipTests

      - name: Upload account-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: account-service-jar
          path: account-service/target/*.jar

      - name: Upload transaction-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: transaction-service-jar
          path: transaction-service/target/*.jar

      - name: Upload notification-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: notification-service-jar
          path: notification-service/target/*.jar

  docker-push-ecr:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JARs
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push account-service
        working-directory: account-service
        run: |
          docker build \
            -t $ECR_REGISTRY/payflow/account-service:${{ github.sha }} \
            -t $ECR_REGISTRY/payflow/account-service:latest \
            .
          docker push $ECR_REGISTRY/payflow/account-service:${{ github.sha }}
          docker push $ECR_REGISTRY/payflow/account-service:latest

      - name: Build and push transaction-service
        working-directory: transaction-service
        run: |
          docker build \
            -t $ECR_REGISTRY/payflow/transaction-service:${{ github.sha }} \
            -t $ECR_REGISTRY/payflow/transaction-service:latest \
            .
          docker push $ECR_REGISTRY/payflow/transaction-service:${{ github.sha }}
          docker push $ECR_REGISTRY/payflow/transaction-service:latest

      - name: Build and push notification-service
        working-directory: notification-service
        run: |
          docker build \
            -t $ECR_REGISTRY/payflow/notification-service:${{ github.sha }} \
            -t $ECR_REGISTRY/payflow/notification-service:latest \
            .
          docker push $ECR_REGISTRY/payflow/notification-service:${{ github.sha }}
          docker push $ECR_REGISTRY/payflow/notification-service:latest

      - name: Print deployed image tags
        run: |
          echo "Deployed images:"
          echo "  account-service:    $ECR_REGISTRY/payflow/account-service:${{ github.sha }}"
          echo "  transaction-service: $ECR_REGISTRY/payflow/transaction-service:${{ github.sha }}"
          echo "  notification-service: $ECR_REGISTRY/payflow/notification-service:${{ github.sha }}"