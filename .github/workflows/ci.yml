name: PayFlow CI/CD Pipeline

# Trigger: run this pipeline on every push to master
# and on every pull request to master
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Test
  # Run all unit tests across all 3 services
  # If any test fails, the pipeline stops here
  # Nothing gets built or deployed
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1: checkout your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: install Java 21
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven   # cache Maven dependencies for faster builds

      # Step 3: run all tests
      - name: Run all tests
        run: mvn clean test

      # Step 4: upload test results so you can see them in GitHub UI
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()   # upload even if tests fail
        with:
          name: test-results
          path: '**/target/surefire-reports/'

  # ─────────────────────────────────────────
  # JOB 2: Build
  # Only runs if tests passed
  # Compiles and packages all 3 services into JARs
  # ─────────────────────────────────────────
  build:
    name: Build Services
    runs-on: ubuntu-latest
    needs: test   # only run if test job passed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Build all 3 services — skipping tests since
      # they already ran in the test job
      - name: Build all services
        run: mvn clean package -DskipTests

      # Upload the built JARs so they can be used
      # by the Docker build job
      - name: Upload account-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: account-service-jar
          path: account-service/target/*.jar

      - name: Upload transaction-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: transaction-service-jar
          path: transaction-service/target/*.jar

      - name: Upload notification-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: notification-service-jar
          path: notification-service/target/*.jar

  # ─────────────────────────────────────────
  # JOB 3: Docker Build
  # Only runs if build passed
  # Builds Docker images for all 3 services
  # ─────────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build   # only run if build job passed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JARs
        run: mvn clean package -DskipTests

      # Build Docker image for account-service
      - name: Build account-service Docker image
        run: |
          docker build \
            -t payflow/account-service:${{ github.sha }} \
            -t payflow/account-service:latest \
            ./account-service

      # Build Docker image for transaction-service
      - name: Build transaction-service Docker image
        run: |
          docker build \
            -t payflow/transaction-service:${{ github.sha }} \
            -t payflow/transaction-service:latest \
            ./transaction-service

      # Build Docker image for notification-service
      - name: Build notification-service Docker image
        run: |
          docker build \
            -t payflow/notification-service:${{ github.sha }} \
            -t payflow/notification-service:latest \
            ./notification-service

      - name: List built images
        run: docker images | grep payflow