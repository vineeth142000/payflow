name: PayFlow CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run all tests
        run: mvn clean test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/target/surefire-reports/'

  build:
    name: Build Services
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all services
        run: mvn clean package -DskipTests

      - name: Upload account-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: account-service-jar
          path: account-service/target/*.jar

      - name: Upload transaction-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: transaction-service-jar
          path: transaction-service/target/*.jar

      - name: Upload notification-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: notification-service-jar
          path: notification-service/target/*.jar

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JARs
        run: mvn clean package -DskipTests

      - name: Build account-service Docker image
        working-directory: account-service
        run: |
          docker build \
            -t payflow/account-service:${{ github.sha }} \
            -t payflow/account-service:latest \
            .

      - name: Build transaction-service Docker image
        working-directory: transaction-service
        run: |
          docker build \
            -t payflow/transaction-service:${{ github.sha }} \
            -t payflow/transaction-service:latest \
            .

      - name: Build notification-service Docker image
        working-directory: notification-service
        run: |
          docker build \
            -t payflow/notification-service:${{ github.sha }} \
            -t payflow/notification-service:latest \
            .

      - name: List built images
        run: docker images | grep payflow